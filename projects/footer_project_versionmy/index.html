<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <title>Footer</title>
  </head>

  <body>
    <main></main>

    <footer>
      <div id="footer-content">

        <!-- COLUNA 1 -->
        <div id="footer_contacts">
          <h1>logo</h1>
          <p>This is all about your dreams</p>

          <div id="footer-social-media">
            <a href="#" class="footer-link" id="instagram">
              <i class="fa-brands fa-instagram"></i>
            </a>
            <a href="#" class="footer-link" id="facebook">
              <i class="fa-brands fa-facebook-f"></i>
            </a>
            <a href="#" class="footer-link" id="whatsapp">
              <i class="fa-brands fa-whatsapp"></i>
            </a>
          </div>
        </div>

        <!-- COLUNA 2 -->
        <ul class="footer-list">
          <li><h3>Blog</h3></li>
          <li><a href="#" class="footer-link">Tech</a></li>
          <li><a href="#" class="footer-link">Adventures</a></li>
          <li><a href="#" class="footer-link">Music</a></li>
        </ul>

        <!-- COLUNA 3 -->
        <ul class="footer-list">
          <li><h3>Products</h3></li>
          <li><a href="#" class="footer-link">App</a></li>
          <li><a href="#" class="footer-link">Desktop</a></li>
          <li><a href="#" class="footer-link">Cloud</a></li>
        </ul>

        <!-- COLUNA 4 -->
        <div id="footer_subscribe">
          <h3>Subscribe</h3>
          <p>Enter your e-mail to receive news and updates</p>

          <div id="input_group">
            <input type="email" placeholder="Your e-mail" />
            <button>
              <i class="fa-solid fa-envelope"></i>
            </button>
          </div>
        </div>

      </div>

      <!-- COPYRIGHT FORA DO GRID -->
      <div id="footer_copyright">
        &#169; 2025 all rights reserve
      </div>
    </footer>

  </body>
</html>
