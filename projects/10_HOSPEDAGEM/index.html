<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter</title>
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
</head>
<body>
    <header class="topo">
        <div class="container">
            <strong>Newsletter</strong>
            <button id="btntema" class="btn">Alterar tema 🌗</button>
        </div>
    </header>

    <main class="container">
        <section class="box">
            <h1>Subscribe</h1>
            <p>Receive news in your email, no spam.</p>

            <form>
                <label for="name">Name</label>
                <input type="text" name="name" id="name" placeholder="Your name">

                <label for="email">Email</label>
                <input type="email" name="email" id="email" placeholder="name@gmail.com"> 

                <button type="submit" class="btn primary">I want to receive</button>
            </form>
        </section>
    </main>

    <footer class="baseboard">
        <div class="container"> 
            <small>Newsletter © <span id="year"></span></small>
        </div>
    </footer>
</body> 
</html>
