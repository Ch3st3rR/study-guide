<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="shortcut icon" href="img/insta logo.png" type="image/x-icon">
</head>
<body>
    <main>
        <!-- Banner container -->
        <div id="main-container">
            <div id="banner-container">
                <img src="img/banner 1.png" alt="Create an account in Instagram">
            </div>
            <!-- Login and Register -->
             <div id="form-container">
                <div id="form-box">
                  <img id="logo-insta" src="img/Instagram-Logo-2016-present.png" alt="Instagram">
                    <form id="login-form">
                        <input
                        type="text"
                        name="username"
                        placeholder="telefone number, user or email"
                        />
                        <input type="password" name="password" placeholder="Senha" />
                        <input type="submit" value="Entrar" />
                    </form>
                    <div class="separator">
    <div class="line"></div>
    <span>Ou</span>
</div>

<div id="other-links">

    <div id="facebook-login">
        <a href="#">
            <img src="img/facebook-svgrepo-com.svg" alt="Facebook login">
            <span>Enter with Facebook</span>
        </a>
    </div>

    <div id="forgot-pass">
        <a href="#">Forgot the password?</a>
    </div>

    <div id="register-container">
        <p>Did you not have an account? <a href="#">Register</a></p>
    </div>

    <div id="get-app-container">
        <p>Get the app</p>
        <a href="#"><img src="img/app store.png" alt="App Store"></a>
        <a href="#"><img src="img/googleplay.png" alt="Google Play"></a>
    </div>

</div>

                    </div>
                </div>
             </div>
        </div>
    </main>
    <footer>
        <nav>
            <ul id="footer-links">
                <li><a href="#">Meta</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Blog</a></li>

                <li><a href="#">Terms</a></li>

                <li><a href="#">Hastags</a></li>
                <li><a href="#">Location</a></li>
                <li><a href="#">Instagram Lite</a></li>
            </ul>
        </nav>
        <div id="pcopyright">&copy;2025 Instagram from Meta</div>
    </footer>
</body>
</html>
