<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Veículo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h3>Cadastre seu veículo para vender mais rápido!</h3>
        </div>

        <div class="form-container">
            <div class="form-body">
                <h1 class="form-title">Venda fácil seu carro!</h1>
                <p>Descreva as características e marque os opcionais que ele possui</p>

                <form>
                    <!-- Título -->
                    <div class="box-input">
                        <label for="title">Título do anúncio <span class="required-field">*</span></label>
                        <input type="text" id="title" name="title" placeholder="Um título para anunciar seu carro" minlength="1" maxlength="30" required>
                    </div>

                    <!-- Marca -->
                    <div class="box-input">
                        <label for="brand">Marca <span class="required-field">*</span></label>
                        <input type="text" id="brand" name="brand" placeholder="Digite a marca do veículo" required>
                    </div>

                    <!-- Modelo -->
                    <div class="box-input">
                        <label for="model">Modelo <span class="required-field">*</span></label>
                        <input type="text" id="model" name="model" placeholder="Digite o modelo do veículo" required>
                    </div>

                    <!-- Quilometragem -->
                    <div class="box-input">
                        <label for="mileage">Quilometragem <span class="required-field">*</span></label>
                        <input type="text" id="mileage" name="mileage" placeholder="Digite a quilometragem do veículo" required>
                    </div>

                    <!-- Data de compra -->
                    <div class="box-input">
                        <label for="purchase_date">Data de compra <span class="required-field">*</span></label>
                        <input type="date" id="purchase_date" name="purchase_date" required>
                    </div>

                    <!-- Tipo de câmbio -->
                    <div class="box-input">
                        <p>Tipo de câmbio: <span class="required-field">*</span></p>
                        <input type="radio" id="manual" name="gear" value="manual" required>
                        <label for="manual">Manual</label>
                        <input type="radio" id="auto" name="gear" value="automatico" required>
                        <label for="auto">Automático</label>
                    </div>

                    <!-- Opcionais -->
                    <div class="optional-list">
                        <p>Opcionais</p>
                        <div class="checkbox-grid">
                            <label><input type="checkbox" name="optional[]" value="airbag"> Airbag</label>
                            <label><input type="checkbox" name="optional[]" value="alarm"> Alarme</label>
                            <label><input type="checkbox" name="optional[]" value="ac"> Ar condicionado</label>
                            <label><input type="checkbox" name="optional[]" value="lane_assist"> Assistente de pista</label>
                            <label><input type="checkbox" name="optional[]" value="keyless"> Partida keyless</label>
                            <label><input type="checkbox" name="optional[]" value="smartphone"> Integração com celular</label>
                            <label><input type="checkbox" name="optional[]" value="leather_seat"> Banco de couro</label>
                        </div>
                    </div>


                    <!-- Descrição -->
                    <div class="box-input">
                        <label for="description">Descrição <span class="required-field">*</span></label>
                        <textarea id="description" name="description" placeholder="Aqui você coloca detalhes do veículo" required></textarea>
                    </div>

                    <!-- Fotos -->
                    <div class="box-input">
                        <label for="images">Fotos do carro <span class="required-field">*</span></label>
                        <input type="file" id="images" name="images" multiple accept="image/png, image/jpg, image/jpeg" required>
                    </div>

                    <!-- Botão Enviar -->
                    <input type="submit" value="Enviar" class="btn-submit">
                </form>
            </div>
        </div>
    </div>
</body>
</html>
